name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # For commitlint on PRs
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38
      
      - name: Enable yarn berry
        run: corepack enable
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .yarn/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      
      - name: Install dependencies
        run: bun install --frozen-lockfile
      
      - name: Run Biome checks
        run: bun run check
      
      - name: Run tests with coverage
        run: bun run coverage
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38
      
      - name: Enable yarn berry
        run: corepack enable
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .yarn/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      
      - name: Install dependencies
        run: bun install --frozen-lockfile
      
      - name: Validate commit messages
        run: |
          # Get all commits in the PR
          git fetch origin main:main
          COMMITS=$(git rev-list --no-merges origin/main..HEAD)
          
          # Validate each commit message
          for commit in $COMMITS; do
            echo "Validating commit: $commit"
            git log --format=%B -n 1 $commit | npx commitlint
          done
