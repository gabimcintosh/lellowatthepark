name: Github Release

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Enable yarn berry
        run: corepack enable
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          # Used to specify a package manager for caching in the default directory. Supported values: npm, yarn, pnpm.
          cache: yarn
          # Used to specify the path to a dependency file: package-lock.json, yarn.lock, etc. Supports wildcards or a list of file names for caching multiple dependencies.
          cache-dependency-path: yarn.lock
          # Version Spec of the version to use. Examples: 12.x, 10.15.1, >=10.15.0.
          node-version: 22.x
      - name: Install dependencies
        run: yarn
      - name: Run build
        run: yarn build
      - name: Upload data for release job
        uses: actions/upload-artifact@v4
        with:
          name: release_contents
          path: |
            dist

  # Create GitHub Release
  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write   # To push the version bump commit and tags
      issues: write     # To comment on fixed issues
      pull-requests: write # To comment on merged PRs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # IMPORTANT: Semantic-release needs full history
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release_contents
          path: dist
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            semantic-release-gitmoji
            @semantic-release/git
            @semantic-release/npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
